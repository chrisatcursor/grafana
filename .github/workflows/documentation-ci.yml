name: Documentation CI
on:
  pull_request:
    branches: ["main"]
    paths: ["docs/sources/**"]
  workflow_dispatch:

permissions: {}

jobs:
  # The Vale action applies the `type/docs` label to documentation PRs. Forks (and some
  # fresh repos) often do not copy Grafana's default labels, which makes `gh pr edit
  # --add-label type/docs` fail with "label ... is not defined". Create it once if missing.
  ensure-docs-label:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Ensure type/docs label exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          REPO="${{ github.repository }}"
          if gh label list -R "$REPO" --json name --jq '.[].name' | grep -qx 'type/docs'; then
            echo "Label type/docs already exists."
          else
            echo "Creating label type/docs for documentation pull requests."
            gh label create -R "$REPO" 'type/docs' --color '5319E7' --description 'Documentation changes'
          fi

  vale:
    needs: ensure-docs-label
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      security-events: write
    container:
      image: grafana/vale:latest # zizmor: ignore[unpinned-images]
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
      - uses: grafana/writers-toolkit/vale-action@vale-action/v1 # zizmor: ignore[unpinned-uses]
        with:
          filter: '.Name in ["Grafana.GrafanaCom", "Grafana.WordList", "Grafana.Spelling", "Grafana.ProductPossessives"]'
          token: ${{ secrets.GITHUB_TOKEN }}
